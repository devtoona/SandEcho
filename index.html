<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SandEcho — 残された時間</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=tod2">
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<canvas id="scene"></canvas>

<div class="hud">
  <div class="hud-actions">
    <button id="settingsBtn" class="settings-btn" aria-label="メモ">✎</button>
    <label class="hud-toggle" title="回転">
      <input type="checkbox" id="rotateToggle" aria-label="自動回転">
      <span class="hud-toggle-ui">
        <img src="assets/icon-rotate.svg" alt="" width="22" height="22" decoding="async">
      </span>
    </label>
    <label class="hud-toggle" title="操作">
      <input type="checkbox" id="exploreToggle" aria-label="拡大・移動">
      <span class="hud-toggle-ui">
        <img src="assets/icon-explore.svg" alt="" width="22" height="22" decoding="async">
      </span>
    </label>
  </div>

  <div class="readout">
    <div class="readout-line"><span id="rDays">--</span><small>日</small></div>
    <div class="readout-sub">
      <span id="rHours">--</span><small>時間</small>
      <span id="rMinutes">--</span><small>分</small>
      <span id="rSeconds">--</span><small>秒</small>
    </div>
    <div class="readout-caption" id="rCaption">残された時間</div>
  </div>
</div>

<div id="settingsModal" class="modal-overlay hidden">
  <div class="memo" role="dialog" aria-labelledby="memoTitle">
    <div class="memo-tape" aria-hidden="true"></div>
    <p class="memo-aside" aria-hidden="true">sand echo</p>
    <h2 id="memoTitle">メモ</h2>

    <label class="memo-field">
      <span class="memo-label">うまれた日</span>
      <input type="date" id="birthDateInput">
    </label>

    <label class="memo-field">
      <span class="memo-label">なん歳まで</span>
      <span class="memo-inline">
        <input type="number" id="lifespanInput" min="1" max="150" value="80" inputmode="numeric">
        <span class="memo-unit">歳</span>
      </span>
    </label>

    <div class="memo-actions">
      <button id="saveSettings" class="memo-save" type="button">私はここにいる</button>
    </div>
  </div>
</div>

<div id="loadingScreen" class="loading-screen">
  <div class="loading-spinner"></div>
</div>

<script type="module" src="main.js?v=tod2"></script>
</body>
</html>
